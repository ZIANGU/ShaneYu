apiVersion: v1alpha1
kind: Setting
metadata:
  name: ShaneYu-setting
spec:
  forms:
    - group: basic
      label: 基础设置
      formSchema:
        - $formkit: attachment
          name: logo_image
          label: Logo 图片
          value: ""
          help: 上传 Logo 图片，留空则显示默认的代码图标
        - $formkit: text
          name: logo_text
          label: Logo 文字
          value: 顾子鞍
          help: 显示在 Logo 图片右侧的站点名称
        - $formkit: text
          name: tagline
          label: 站点标语
          value: 源于禹州，面向世界
          help: 显示在 Logo 文字下方的小字标语
        - $formkit: radio
          name: color_scheme
          label: 默认配色方案
          value: auto
          options:
            - label: 跟随系统
              value: auto
            - label: 浅色
              value: light
            - label: 暗色
              value: dark
        - $formkit: color
          name: primary_color
          label: 主题主色调
          value: "#4A90E2"
          help: 设置全站的主题主色调，影响按钮、链接、高亮等元素的颜色
        - $formkit: switch
          name: show_copyright
          label: 显示主题名称
          value: true
          help: 在页脚底部显示主题名称（Theme ShaneYu）
        - $formkit: textarea
          name: footer_text
          label: 页脚版权文字
          value: "Shane Yu"
          help: 显示在页脚底部的版权信息
        - $formkit: text
          name: icp
          label: ICP 备案号
          value: ""
          help: 如：京ICP备XXXXXXXX号
        - $formkit: text
          name: police_icp
          label: 公安备案号
          value: ""
          help: 如：京公网安备XXXXXXXX号
        - $formkit: attachment
          name: light_wallpaper
          label: 亮色模式背景壁纸
          value: ""
          accept: "image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime,video/x-matroska,video/x-msvideo,video/x-flv,video/3gpp"
          help: 上传亮色模式下的背景壁纸,支持图片和视频格式
        - $formkit: attachment
          name: dark_wallpaper
          label: 暗色模式背景壁纸
          value: ""
          accept: "image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime,video/x-matroska,video/x-msvideo,video/x-flv,video/3gpp"
          help: 上传暗色模式下的背景壁纸,支持图片和视频格式

    - group: social
      label: 社交链接
      formSchema:
        - $formkit: text
          name: author_name
          label: 博主昵称
          value: "顾子鞍"
          help: 博主昵称，用于侧边栏展示
        - $formkit: attachment
          name: author_avatar
          label: 博主头像
          value: ""
          help: 显示在侧边栏的头像图片,建议 1:1 方形图
        - $formkit: textarea
          name: author_bio
          label: 博主简介
          value: "源于禹州|面向世界"
          help: 显示在侧边栏的一句话简介
        - $formkit: repeater
          name: links
          label: 社交链接列表
          help: 添加你的社交媒体链接,支持自定义图标和链接
          value: []
          children:
            - $formkit: text
              name: name
              label: 名称
              validation: required
              help: 社交平台名称,如 GitHub、Twitter 等
            - $formkit: text
              name: url
              label: 链接
              validation: required
              help: 完整的链接地址,Email 请填写邮箱地址
            - $formkit: select
              name: icon
              label: 内置图标
              value: "github"
              options:
                - label: GitHub
                  value: github
                - label: QQ
                  value: qq
                - label: Email
                  value: email
                - label: 微博
                  value: weibo
                - label: 微信
                  value: wechat
                - label: 知乎
                  value: zhihu
                - label: CSDN
                  value: csdn
                - label: Gitee
                  value: gitee
              help: 快速选择常见社交图标（当 Iconify 图标为空时使用）
            - $formkit: text
              name: iconifyIcon
              label: Iconify 图标
              placeholder: "mdi:github"
              help: "从 Iconify 图标库输入图标名称（如 mdi:github、ri:twitter-x-fill），可在 `https://icon-sets.iconify.design` 查找。优先级高于内置图标，留空则使用上方内置图标"

    - group: sidebar
      label: 侧边栏设置
      formSchema:
        - $formkit: switch
          name: show_sidebar
          label: 显示侧边栏
          value: true
          help: 在所有页面显示左侧侧边栏;
        - $formkit: switch
          name: show_author
          label: 显示博主展示
          value: true
          help: 在侧边栏顶部显示博主个人信息卡片
        - $formkit: switch
          name: show_tag_cloud
          label: 显示热门标签
          value: true
          help: 以词云形式展示标签,标签大小随文章数自动变化
        - $formkit: number
          name: tag_cloud_count
          label: 热门标签数量
          value: 20
          min: 5
          max: 50
          step: 1
          help: 标签云中最多显示的标签数量
        - $formkit: switch
          name: show_wechat_qr
          label: 显示公众号二维码
          value: false
          help: 在侧边栏显示微信公众号二维码图片
        - $formkit: attachment
          name: wechat_qr_image
          label: 公众号二维码图片
          value: ""
          help: 上传微信公众号二维码图片,建议 1:1 正方形
        - $formkit: text
          name: wechat_qr_title
          label: 公众号名称
          value: ""
          help: 显示在二维码下方的公众号名称,留空则显示"期待你的关注！"
        - $formkit: switch
          name: show_categories
          label: 显示分类导航
          value: true
        - $formkit: number
          name: categories_count
          label: 分类显示数量
          value: 6
          min: 1
          max: 30
          help: 侧边栏分类导航最多显示的分类数量
        - $formkit: switch
          name: show_recent
          label: 显示近期更新
          value: true
        - $formkit: number
          name: recent_count
          label: 近期更新数量
          value: 4
          min: 1
          max: 30
