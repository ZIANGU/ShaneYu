<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{gateway_fragments/layout :: layout(title = |登录 - ${site.title}|, head = ~{::head}, body = ~{::body})}"
>
  <th:block th:fragment="body">
    <div class="login-container">
      <!-- 左侧品牌区域 -->
      <div class="login-left">
        <div class="login-brand">
          <a th:href="@{/}">
            <img
              th:src="${theme.config?.basic?.logo_image != null and !#strings.isEmpty(theme.config?.basic?.logo_image) ? theme.config.basic.logo_image : '/themes/theme-ShaneYu/assets/images/logo.png'}"
              th:width="${theme.config?.basic?.logo_image_size ?: 48}"
              th:height="${theme.config?.basic?.logo_image_size ?: 48}"
              alt="Logo"
            />
            <div class="brand-text">
              <span
                class="brand-name"
                th:text="${theme.config?.basic?.logo_text ?: site.title}"
              ></span>
              <span
                class="brand-tagline"
                th:text="${theme.config?.basic?.tagline ?: site.subtitle}"
              ></span>
            </div>
          </a>
        </div>
        <div class="login-illustration">
          <svg viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="50" y="80" width="300" height="180" rx="8" stroke-opacity="0.3" />
            <rect x="70" y="100" width="80" height="60" rx="4" />
            <rect
              x="70"
              y="100"
              width="80"
              height="12"
              rx="2"
              fill="currentColor"
              fill-opacity="0.1"
            />
            <line x1="80" y1="125" x2="140" y2="125" stroke-opacity="0.4" />
            <line x1="80" y1="138" x2="130" y2="138" stroke-opacity="0.4" />
            <line x1="80" y1="151" x2="145" y2="151" stroke-opacity="0.4" />
            <rect x="170" y="100" width="160" height="140" rx="4" />
            <rect
              x="185"
              y="115"
              width="130"
              height="10"
              rx="2"
              fill="currentColor"
              fill-opacity="0.15"
            />
            <circle cx="200" cy="145" r="35" stroke-opacity="0.6" />
            <circle cx="200" cy="145" r="20" stroke-opacity="0.4" />
            <circle cx="200" cy="145" r="8" fill="currentColor" fill-opacity="0.2" />
            <line x1="185" y1="195" x2="305" y2="195" stroke-opacity="0.4" />
            <line x1="185" y1="210" x2="280" y2="210" stroke-opacity="0.4" />
            <line x1="185" y1="225" x2="295" y2="225" stroke-opacity="0.4" />
            <circle cx="350" cy="60" r="40" stroke-opacity="0.2" />
            <circle cx="60" cy="260" r="30" stroke-opacity="0.2" />
            <circle cx="340" cy="250" r="20" stroke-opacity="0.15" />
          </svg>
        </div>
        <div class="login-slogan">
          <p th:text="${theme.config?.basic?.tagline ?: '源于禹州，面向世界'}"></p>
        </div>
      </div>

      <!-- 右侧登录表单 -->
      <div class="login-right">
        <div class="login-form-wrap">
          <div class="login-header">
            <h1 data-i18n="login.welcome">欢迎回来</h1>
            <p data-i18n="login.subtitle">请登录您的账户</p>
          </div>

          <!-- Halo 内置登录表单（处理认证、RSA加密、TOTP等） -->
          <div th:replace="~{gateway_fragments/login::form}"></div>

          <!-- 其他认证方式 -->
          <div th:replace="~{gateway_fragments/login::formAuthProviders}"></div>

          <!-- 社交登录 -->
          <div th:replace="~{gateway_fragments/common::socialAuthProviders}"></div>

          <!-- 注册入口 -->
          <div class="login-footer" th:if="${globalInfo.allowRegistration}">
            <p>
              <span data-i18n="login.no_account">还没有账户？</span
              ><a th:href="@{/signup}" data-i18n="login.register">立即注册</a>
            </p>
          </div>

          <!-- 返回站点 -->
          <div class="login-footer">
            <p><a th:href="@{/}" data-i18n="login.back_to_site">← 返回站点</a></p>
          </div>
        </div>
      </div>
    </div>
  </th:block>
</html>
