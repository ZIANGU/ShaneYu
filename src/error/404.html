<!doctype html>
<html
  lang="zh-CN"
  xmlns:th="http://www.thymeleaf.org"
  th:data-primary-color="${theme.config?.basic?.primary_color}"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="|404 - ${site.title}|">404 - 页面未找到</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="icon" th:if="${site.favicon}" th:href="${site.favicon}" />
    <script>
      var primaryColor = document.documentElement.getAttribute("data-primary-color");
      if (primaryColor) {
        document.documentElement.style.setProperty("--color-primary", primaryColor);
      }
      (function () {
        var s = localStorage.getItem("ShaneYu-theme");
        var c = '[[${theme.config?.basic?.color_scheme ?: "auto"}]]';
        if (s) {
          document.documentElement.setAttribute("data-theme", s);
        } else if (c === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        } else if (c === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme:dark)").matches) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body class="site-body">
    <div class="error-page">
      <div class="error-content">
        <div class="error-icon">
          <svg viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="60" cy="60" r="45" />
            <line x1="60" y1="40" x2="60" y2="60" />
            <line x1="60" y1="70" x2="60" y2="80" />
            <line x1="45" y1="45" x2="55" y2="55" />
            <line x1="75" y1="45" x2="65" y2="55" />
            <line x1="45" y1="75" x2="55" y2="65" />
            <line x1="75" y1="75" x2="65" y2="65" />
          </svg>
        </div>
        <h1>404</h1>
        <p>页面未找到</p>
        <p class="error-desc">抱歉，您访问的页面不存在或已被移动</p>
        <a th:href="@{/}" class="error-btn">返回首页</a>
      </div>
    </div>
  </body>
</html>
